<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240">
  <!-- Concept 1: Connected nodes -->
  <g id="concept-1" transform="translate(40,20)">
