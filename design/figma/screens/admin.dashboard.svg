  <!-- Main content -->
  <g transform="translate(260,112)">
    <text x="0" y="28" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="#0B2B4A">System Overview</text>
    <g transform="translate(0,48)">
      <!-- cards -->
      <rect x="0" y="0" width="240" height="110" rx="10" fill="#FFFFFF" stroke="#EBEDF1"/>
