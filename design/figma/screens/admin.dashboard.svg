      <text x="16" y="68" font-size="24" fill="#22356F">128</text>

      <rect x="280" y="0" width="240" height="110" rx="10" fill="#FFFFFF" stroke="#EBEDF1"/>
      <text x="296" y="36" font-size="13" fill="#9AA3B2">Active Users</text>
      <text x="296" y="68" font-size="24" fill="#22356F">2,412</text>

      <rect x="560" y="0" width="240" height="110" rx="10" fill="#FFFFFF" stroke="#EBEDF1"/>
      <text x="576" y="36" font-size="13" fill="#9AA3B2">Total Deliveries</text>
      <text x="576" y="68" font-size="24" fill="#22356F">48,321</text>
    </g>
    <!-- Analytics placeholder chart -->
    <rect x="0" y="180" width="880" height="300" rx="12" fill="#FFFFFF" stroke="#EBEDF1"/>
    <text x="16" y="208" font-family="Inter, sans-serif" font-size="14" fill="#6B7280">Delivery growth (placeholder chart)</text>
  </g>
