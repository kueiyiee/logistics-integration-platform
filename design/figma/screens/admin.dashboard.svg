<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="100%" height="100%" fill="#F6F7F9"/>
  <!-- Sidebar -->
  <rect x="24" y="24" width="220" height="840" rx="12" fill="#FFFFFF" stroke="#E6E9EE"/>
  <text x="48" y="64" font-family="Inter, sans-serif" font-size="18" fill="#0B2B4A">DeliveryPortal</text>
  <g transform="translate(48,96)" font-family="Inter, sans-serif" font-size="14" fill="#22356F">
    <text y="0">Dashboard</text>
    <text y="36">Organizations</text>
    <text y="72">Users</text>
    <text y="108">Roles & Permissions</text>
    <text y="144">Deliveries</text>
    <text y="180">API Management</text>
    <text y="216">Webhooks</text>
    <text y="252">Analytics</text>
    <text y="288">Audit Logs</text>
    <text y="324">Security Center</text>
    <text y="360">System Settings</text>
  </g>
  <!-- Top bar -->
  <rect x="260" y="24" width="1096" height="64" rx="8" fill="#FFFFFF" stroke="#E6E9EE"/>
