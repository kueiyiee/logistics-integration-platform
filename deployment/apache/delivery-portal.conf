<VirtualHost *:80>
    ServerName localhost
    DocumentRoot "C:/xampp/htdocs/delivery-portal/backend/public"

    <Directory "C:/xampp/htdocs/delivery-portal/backend/public">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog "logs/delivery-portal-error.log"
    CustomLog "logs/delivery-portal-access.log" common
</VirtualHost>
