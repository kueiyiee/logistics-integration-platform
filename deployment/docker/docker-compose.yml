version: '3.9'

services:
  app:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: delivery-portal-app
    env_file:
      - ../backend/.env.example
    ports:
      - '8000:8000'
    depends_on:
      - mysql
      - redis
    volumes:
      - ../backend:/var/www/html
    command: php artisan serve --host=0.0.0.0 --port=8000

  frontend:
    image: node:20-alpine
    container_name: delivery-portal-frontend
    working_dir: /var/www/frontend
    volumes:
      - ../frontend:/var/www/frontend
    ports:
      - '5173:5173'
    command: npm install && npm run dev -- --host 0.0.0.0

  mysql:
    image: mysql:8.0
    container_name: delivery-portal-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: delivery_portal
      MYSQL_USER: app_user
      MYSQL_PASSWORD: secret
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: delivery-portal-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
